<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Tài liệu lớp 11</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    font-family: 'Poppins', sans-serif;
    background: #020617;
    color: white;
    overflow-x: hidden;
}

/* ===== LOADING ===== */
#loading{
    position:fixed;
    width:100%;
    height:100%;
    background:#000;
    display:flex;
    justify-content:center;
    align-items:center;
    z-index:9999;
}
.progress{
    width:200px;
    height:8px;
    background:#222;
}
.progress-bar{
    height:100%;
    width:0%;
    background:cyan;
}

/* ===== CREDIT ===== */
.credit{
 position:fixed;
 bottom:10px;
 right:15px;
 color:cyan;
 font-size:13px;
}

/* ===== GRID ===== */
.container {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(180px,1fr));
    gap: 20px;
    padding: 30px;
}

/* ===== CARD ===== */
.card {
    padding: 20px;
    border-radius: 15px;
    text-align: center;
    cursor: pointer;
    background: rgba(255,255,255,0.08);
}

/* ===== LINK ===== */
.link {
    display: block;
    padding: 12px;
    margin: 10px auto;
    width: 250px;
    background: rgba(255,255,255,0.1);
    text-decoration: none;
    color: cyan;
}

/* ===== AI BOX ===== */
#aiBox{
 position:fixed;
 bottom:20px;
 right:20px;
 width:260px;
 background:#020617;
 border:1px solid cyan;
 border-radius:12px;
 overflow:hidden;
 font-size:13px;
}

#chatbox{
 height:180px;
 overflow:auto;
 padding:10px;
}

#userInput{
 width:100%;
 padding:10px;
 background:#000;
 color:white;
 border:none;
}
</style>
</head>

<body>

<!-- LOADING -->
<div id="loading">
    <div>
        <h2>Loading...</h2>
        <div class="progress">
            <div class="progress-bar" id="progressBar"></div>
        </div>
    </div>
</div>

<!-- MAIN -->
<div id="main" class="container"></div>

<!-- CREDIT -->
<div class="credit">🤖 Website do AI tạo ra</div>

<!-- AI -->
<div id="aiBox">
<div style="background:cyan;color:black;padding:8px;text-align:center">
🤖 AI Chat
</div>

<div id="chatbox"></div>

<input id="userInput" placeholder="Hỏi AI...">
<button onclick="askAI()" style="width:100%;padding:10px;background:cyan;border:none">
Gửi
</button>
</div>

<script>

/* DATA */
const data = {
    "11A1": {
        "Nhóm 1": [
            {name:"Bài tập Toán", link:"#"},
            {name:"Đề kiểm tra", link:"#"}
        ],
        "Nhóm 2": [],
        "Nhóm 3": [],
        "Nhóm 4": []
    }
};

const main=document.getElementById("main");

/* MENU */
function showClasses(){
 main.innerHTML="";
 Object.keys(data).forEach(c=>{
  main.innerHTML+=`<div class="card">${c}</div>`;
 });

 document.querySelectorAll(".card").forEach((el,i)=>{
  el.onclick=()=>showGroups(Object.keys(data)[i]);
 });
}

/* GROUP */
function showGroups(c){
 main.innerHTML="";
 Object.keys(data[c]).forEach(g=>{
  main.innerHTML+=`<div class="card">${g}</div>`;
 });

 document.querySelectorAll(".card").forEach((el,i)=>{
  el.onclick=()=>showLinks(Object.keys(data[c])[i],c);
 });
}

/* LINK */
function showLinks(g,c){
 main.innerHTML="";
 data[c][g].forEach(item=>{
  main.innerHTML+=`<a href="${item.link}" target="_blank" class="link">${item.name}</a>`;
 });
}

/* ===== AI ===== */
function askAI(){
 const input=document.getElementById("userInput");
 const msg=input.value.toLowerCase().trim();
 if(!msg) return;

 const chat=document.getElementById("chatbox");
 chat.innerHTML+=`<div>> ${msg}</div>`;

 let reply="Không hiểu 😅";

 Object.keys(data).forEach(c=>{
  Object.keys(data[c]).forEach(g=>{
   data[c][g].forEach(item=>{
    if(msg.includes(item.name.toLowerCase())){
     reply=`👉 Mở: <a href="${item.link}" target="_blank" style="color:cyan">${item.name}</a>`;
    }
   });
  });
 });

 if(msg.includes("toán")){
  reply=`👉 Gợi ý: <a href="#" target="_blank" style="color:cyan">Bài tập Toán</a>`;
 }

 chat.innerHTML+=`<div style="color:cyan">${reply}</div>`;
 chat.scrollTop=chat.scrollHeight;

 input.value="";
}

/* LOADING */
let p=0;
let load=setInterval(()=>{
 p+=10;
 document.getElementById("progressBar").style.width=p+"%";
 if(p>=100){
  clearInterval(load);
  document.getElementById("loading").style.display="none";
 }
},200);

/* START */
showClasses();

</script>

</body>
</html>
