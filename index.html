<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Tài liệu lớp 11</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    font-family: 'Poppins', sans-serif;
    background: #020617;
    color: white;
    overflow-x: hidden;
    transition: 0.3s;
}

/* ===== THEME BUTTON ===== */
.theme-toggle {
    position: fixed;
    top: 20px;
    right: 20px;
    padding: 10px 15px;
    border-radius: 20px;
    border: none;
    cursor: pointer;
    z-index: 1000;
}

/* ===== LIGHT MODE ===== */
body.light {
    background: linear-gradient(135deg, #e0f2fe, #f8fafc);
    color: #0f172a;
}

body.light .card,
body.light .intro {
    background: white;
    color: black;
}

body.light .link {
    background: #e2e8f0;
    color: #2563eb;
}

/* ===== NỀN HỌC TẬP ===== */
.study-bg {
    position: fixed;
    width: 100%;
    height: 100%;
    z-index: -1;
    overflow: hidden;
}

.icon {
    position: absolute;
    font-size: 26px;
    opacity: 0.15;
    animation: float linear infinite;
}

@keyframes float {
    from { transform: translateY(100vh) rotate(0deg); }
    to { transform: translateY(-10vh) rotate(360deg); }
}

/* ===== HEADER ===== */
.header {
    text-align: center;
    padding: 40px 20px;
}

.logo {
    width: 100px;
    border-radius: 50%;
}

/* ===== GRID ===== */
.container {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(180px,1fr));
    gap: 20px;
    padding: 30px;
}

/* ===== CARD ===== */
.card {
    padding: 25px;
    border-radius: 20px;
    text-align: center;
    cursor: pointer;
    background: rgba(255,255,255,0.08);
    transition: 0.3s;
}

.card:hover {
    transform: scale(1.1);
}

/* ===== INTRO ===== */
.intro {
    max-width: 800px;
    margin: auto;
    padding: 25px;
    border-radius: 20px;
    background: rgba(255,255,255,0.08);
    text-align: center;
}

/* ===== LINK ===== */
.link {
    display: block;
    padding: 12px;
    margin: 10px auto;
    width: 250px;
    border-radius: 10px;
    background: rgba(255,255,255,0.1);
    text-decoration: none;
    color: cyan;
}

/* ===== BACK ===== */
.back {
    position: fixed;
    bottom: 20px;
    left: 20px;
    padding: 10px 15px;
    background: cyan;
    color: black;
    border-radius: 20px;
    cursor: pointer;
    display: none;
}
</style>
</head>

<body>

<!-- nền -->
<div class="study-bg" id="bg"></div>

<!-- nút theme -->
<button class="theme-toggle" onclick="toggleTheme()">🌙 Dark</button>

<!-- header -->
<div class="header">
    <img src="9ae3a6a7a8ce299070df.jpg" class="logo">
    <h1>📚 TÀI LIỆU LỚP 11</h1>
</div>

<!-- nội dung -->
<div id="main" class="container"></div>
<div class="back" id="backBtn" onclick="back()">⬅</div>

<script>

/* DATA */
const data = {
    "11A1": {
        "Nhóm 1": [
            {name:"Bài tập Toán", link:"#"},
            {name:"Đề kiểm tra", link:"#"}
        ],
        "Nhóm 2": [],
        "Nhóm 3": [],
        "Nhóm 4": []
    },
    "11A2": {"Nhóm 1": [],"Nhóm 2": [],"Nhóm 3": [],"Nhóm 4": []},
    "11A3": {"Nhóm 1": [],"Nhóm 2": [],"Nhóm 3": [],"Nhóm 4": []},
    "11A6": {"Nhóm 1": [],"Nhóm 2": [],"Nhóm 3": [],"Nhóm 4": []}
};

let currentClass="";
const main=document.getElementById("main");

/* ===== MENU ===== */
function showClasses(){
    main.innerHTML="";
    document.getElementById("backBtn").style.display="none";

    main.innerHTML += `<div class="card">📖 Giới thiệu</div>`;

    Object.keys(data).forEach(c=>{
        main.innerHTML += `<div class="card">${c}</div>`;
    });

    document.querySelectorAll(".card").forEach((el,i)=>{
        if(i===0){
            el.onclick=showIntro;
        } else {
            el.onclick=()=>showGroups(Object.keys(data)[i-1]);
        }
    });
}

/* ===== GIỚI THIỆU ===== */
function showIntro(){
    main.innerHTML = `
    <div class="intro">
        <h2>📖 Giới thiệu</h2>

        <p>
            Website được tạo ra nhằm lưu trữ và chia sẻ các tài liệu học tập môn 
            <b>Giáo dục địa phương</b> dành cho học sinh khối 11.
        </p>

        <p>
            Tài liệu được phân chia theo từng lớp và từng nhóm, giúp học sinh dễ dàng 
            tìm kiếm và sử dụng trong quá trình học tập.
        </p>

        <p>🏫 THPT Đại Ngãi</p>
        <p>📚 Khối 11</p>
        <p>📅 2026</p>

        <p>💡 Hỗ trợ học tập nhanh chóng và hiệu quả hơn.</p>
    </div>
    `;
    document.getElementById("backBtn").style.display="block";
}

/* ===== GROUP ===== */
function showGroups(c){
    currentClass=c;
    main.innerHTML="";
    document.getElementById("backBtn").style.display="block";

    Object.keys(data[c]).forEach(g=>{
        main.innerHTML+=`<div class="card">${g}</div>`;
    });

    document.querySelectorAll(".card").forEach((el,i)=>{
        el.onclick=()=>showLinks(Object.keys(data[c])[i]);
    });
}

/* ===== LINK ===== */
function showLinks(g){
    main.innerHTML="";
    data[currentClass][g].forEach(item=>{
        main.innerHTML+=`<a href="${item.link}" target="_blank" class="link">${item.name}</a>`;
    });
}

/* ===== BACK ===== */
function back(){
    showClasses();
}

/* ===== THEME ===== */
function toggleTheme(){
    document.body.classList.toggle("light");
    const btn=document.querySelector(".theme-toggle");

    if(document.body.classList.contains("light")){
        btn.innerText="☀️ Light";
        localStorage.setItem("theme","light");
    } else {
        btn.innerText="🌙 Dark";
        localStorage.setItem("theme","dark");
    }
}

const btn=document.querySelector(".theme-toggle");
if(localStorage.getItem("theme")==="light"){
    document.body.classList.add("light");
    btn.innerText="☀️ Light";
}

/* ===== NỀN ICON ===== */
const icons=["📚","✏️","📖","📝","📐","🎓","📊","🧠"];

function createIcon(){
    let el=document.createElement("div");
    el.className="icon";
    el.innerText=icons[Math.floor(Math.random()*icons.length)];

    el.style.left=Math.random()*100+"vw";
    el.style.animationDuration=(6+Math.random()*6)+"s";

    document.getElementById("bg").appendChild(el);

    setTimeout(()=>el.remove(),10000);
}

setInterval(createIcon,400);

/* LOAD */
showClasses();

</script>

</body>
</html>
