<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Tài liệu lớp 11</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI';
    background: #0f2027;
    color: white;
    text-align: center;
}

/* nền động */
#bg {
    position: fixed;
    width: 100%;
    height: 100%;
    background: linear-gradient(270deg,#1d2b64,#f8cdda,#1d2b64);
    background-size: 600% 600%;
    animation: gradient 10s ease infinite;
    z-index: -1;
}

@keyframes gradient {
    0% {background-position:0%}
    50% {background-position:100%}
    100% {background-position:0%}
}

h1 {
    margin-top: 30px;
}

/* card */
.container {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
}

.card {
    margin: 15px;
    padding: 25px;
    width: 200px;
    border-radius: 20px;
    background: rgba(255,255,255,0.1);
    backdrop-filter: blur(10px);
    transition: 0.3s;
    cursor: pointer;
}

.card:hover {
    transform: scale(1.1);
}

.hidden {
    display: none;
}

button {
    margin-top: 20px;
    padding: 10px 20px;
    border-radius: 20px;
    border: none;
    background: cyan;
    cursor: pointer;
}

/* search */
input {
    margin: 20px;
    padding: 10px;
    width: 250px;
    border-radius: 20px;
    border: none;
    text-align: center;
}
</style>
</head>

<body>

<div id="bg"></div>

<h1>📚 TÀI LIỆU LỚP 11</h1>

<input type="text" placeholder="Tìm tài liệu..." onkeyup="search(this.value)">

<!-- TRANG LỚP -->
<div id="classes" class="container">
    <div class="card" onclick="openClass('11A1')">11A1</div>
    <div class="card" onclick="openClass('11A2')">11A2</div>
    <div class="card" onclick="openClass('11A3')">11A3</div>
    <div class="card" onclick="openClass('11A6')">11A6</div>
</div>

<!-- TRANG NHÓM -->
<div id="groups" class="container hidden"></div>

<!-- TRANG LINK -->
<div id="links" class="container hidden"></div>

<button onclick="back()" id="backBtn" class="hidden">⬅ Quay lại</button>

<script>
let currentClass = "";
let level = 0;

/* mở lớp */
function openClass(name) {
    currentClass = name;
    level = 1;

    document.getElementById("classes").classList.add("hidden");

    let html = "";
    for(let i=1;i<=4;i++){
        html += `<div class="card" onclick="openGroup(${i})">Nhóm ${i}</div>`;
    }

    document.getElementById("groups").innerHTML = html;
    document.getElementById("groups").classList.remove("hidden");
    document.getElementById("backBtn").classList.remove("hidden");
}

/* mở nhóm */
function openGroup(n) {
    level = 2;

    document.getElementById("groups").classList.add("hidden");

    let html = "";

    for(let i=1;i<=5;i++){
        html += `<div class="card">
            <a href="#" target="_blank">📄 ${currentClass} - Nhóm ${n} - Tài liệu ${i}</a>
        </div>`;
    }

    document.getElementById("links").innerHTML = html;
    document.getElementById("links").classList.remove("hidden");
}

/* quay lại */
function back() {
    if(level==2){
        document.getElementById("links").classList.add("hidden");
        document.getElementById("groups").classList.remove("hidden");
        level=1;
    }
    else if(level==1){
        document.getElementById("groups").classList.add("hidden");
        document.getElementById("classes").classList.remove("hidden");
        document.getElementById("backBtn").classList.add("hidden");
        level=0;
    }
}

/* tìm kiếm */
function search(text){
    let cards = document.querySelectorAll(".card");
    cards.forEach(c=>{
        if(c.innerText.toLowerCase().includes(text.toLowerCase())){
            c.style.display="block";
        } else {
            c.style.display="none";
        }
    });
}
</script>

</body>
</html>
