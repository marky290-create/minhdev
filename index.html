<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Tài liệu lớp 11</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    font-family: 'Poppins', sans-serif;
    background: #020617;
    color: white;
    overflow-x: hidden;
}

/* ===== LOADING ===== */
#loading{
 position:fixed;
 width:100%;
 height:100%;
 background:#020617;
 display:flex;
 justify-content:center;
 align-items:center;
 flex-direction:column;
 z-index:9999;
}
.loader{
 width:50px;
 height:50px;
 border:5px solid rgba(255,255,255,0.2);
 border-top:5px solid cyan;
 border-radius:50%;
 animation:spin 1s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg);}}

/* ===== THEME ===== */
.theme-toggle {
    position: fixed;
    top: 20px;
    right: 20px;
    padding: 10px;
    border-radius: 20px;
    cursor: pointer;
}

/* ===== HEADER ===== */
.header {
    text-align: center;
    padding: 40px;
}
.logo {
    width: 100px;
    border-radius: 50%;
}
h1{
 text-shadow:0 0 10px cyan;
}

/* ===== GRID ===== */
.container {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(180px,1fr));
    gap: 20px;
    padding: 30px;
}

/* ===== CARD GAME ===== */
.card {
    padding: 25px;
    border-radius: 15px;
    text-align: center;
    cursor: pointer;
    background: rgba(0,0,0,0.6);
    border:1px solid rgba(0,255,255,0.3);
    color:cyan;
    transition: 0.3s;
}
.card:hover {
    transform: scale(1.1);
    box-shadow:0 0 20px cyan;
}

/* ===== INTRO ===== */
.intro {
    max-width: 700px;
    margin: auto;
    padding: 20px;
    border-radius: 15px;
    background: rgba(0,0,0,0.6);
    border:1px solid cyan;
}

/* ===== LINK ===== */
.link {
    display: block;
    padding: 12px;
    margin: 10px auto;
    width: 250px;
    border-radius: 10px;
    border:1px solid cyan;
    background: rgba(0,0,0,0.6);
    color: cyan;
    text-decoration: none;
}
.link:hover{box-shadow:0 0 10px cyan;}

/* ===== BACK ===== */
.back {
    position: fixed;
    bottom: 20px;
    left: 20px;
    padding: 10px;
    background: cyan;
    color: black;
    border-radius: 20px;
    cursor: pointer;
    display: none;
}

/* ===== RIPPLE ===== */
@keyframes ripple{
 from{transform:scale(1);opacity:0.7;}
 to{transform:scale(10);opacity:0;}
}

/* ===== NỀN ===== */
.study-bg {
    position: fixed;
    width: 100%;
    height: 100%;
    z-index: -1;
}
.icon {
    position: absolute;
    opacity: 0.15;
    animation: float linear infinite;
}
@keyframes float {
    from { transform: translateY(100vh); }
    to { transform: translateY(-10vh); }
}
</style>
</head>

<body>

<!-- LOADING -->
<div id="loading">
 <div class="loader"></div>
 <p>Đang tải...</p>
</div>

<div class="study-bg" id="bg"></div>

<button class="theme-toggle" onclick="toggleTheme()">🌙</button>

<div class="header">
    <img src="logo.png" class="logo">
    <h1>📚 TÀI LIỆU LỚP 11</h1>
</div>

<div id="main" class="container"></div>
<div class="back" id="backBtn" onclick="back()">⬅</div>

<script>

/* DATA giữ nguyên */
const data = {
 "11A1":{"Nhóm 1":[{name:"Toán",link:"#"}],"Nhóm 2":[],"Nhóm 3":[],"Nhóm 4":[]},
 "11A2":{"Nhóm 1":[],"Nhóm 2":[],"Nhóm 3":[],"Nhóm 4":[]},
 "11A3":{"Nhóm 1":[],"Nhóm 2":[],"Nhóm 3":[],"Nhóm 4":[]},
 "11A6":{"Nhóm 1":[],"Nhóm 2":[],"Nhóm 3":[],"Nhóm 4":[]}
};

let currentClass="";
const main=document.getElementById("main");

/* MENU */
function showClasses(){
 main.innerHTML="";
 backBtn.style.display="none";

 main.innerHTML+=`<div class="card">📖 Giới thiệu</div>`;

 Object.keys(data).forEach(c=>{
  main.innerHTML+=`<div class="card">${c}</div>`;
 });

 document.querySelectorAll(".card").forEach((el,i)=>{
  if(i==0) el.onclick=showIntro;
  else el.onclick=()=>showGroups(Object.keys(data)[i-1]);
 });
}

/* INTRO */
function showIntro(){
 main.innerHTML=`<div class="intro">Website tài liệu lớp 11</div>`;
 backBtn.style.display="block";
}

/* GROUP */
function showGroups(c){
 currentClass=c;
 main.innerHTML="";
 backBtn.style.display="block";

 Object.keys(data[c]).forEach(g=>{
  main.innerHTML+=`<div class="card">${g}</div>`;
 });

 document.querySelectorAll(".card").forEach((el,i)=>{
  el.onclick=()=>showLinks(Object.keys(data[c])[i]);
 });
}

/* LINKS */
function showLinks(g){
 main.innerHTML="";
 data[currentClass][g].forEach(i=>{
  main.innerHTML+=`<a class="link" href="${i.link}" target="_blank">${i.name}</a>`;
 });
}

/* BACK */
function back(){showClasses();}

/* THEME */
function toggleTheme(){
 document.body.classList.toggle("light");
}

/* NỀN */
const icons=["📚","✏️","📖","📝","🎓"];
setInterval(()=>{
 let el=document.createElement("div");
 el.className="icon";
 el.innerText=icons[Math.floor(Math.random()*icons.length)];
 el.style.left=Math.random()*100+"vw";
 el.style.animationDuration=(6+Math.random()*6)+"s";
 bg.appendChild(el);
 setTimeout(()=>el.remove(),10000);
},400);

/* RIPPLE */
document.addEventListener("click",e=>{
 let r=document.createElement("span");
 r.style.position="fixed";
 r.style.left=e.clientX+"px";
 r.style.top=e.clientY+"px";
 r.style.width="10px";
 r.style.height="10px";
 r.style.background="cyan";
 r.style.borderRadius="50%";
 r.style.animation="ripple 0.6s";
 document.body.appendChild(r);
 setTimeout(()=>r.remove(),600);
});

/* LOADING */
window.onload=()=>{
 setTimeout(()=>{
  document.getElementById("loading").style.display="none";
 },800);
};

showClasses();

</script>

</body>
</html>
