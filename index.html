<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tài liệu lớp 11</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            font-family: 'Poppins', sans-serif;
            background: #020617;
            color: white;
            overflow-x: hidden;
            transition: 0.3s;
        }
        /* ===== NỀN SÓC TRĂNG (SLIDE) ===== */
        .soc-trang-bg{
        position:fixed;
        width:100%;
        height:100%;
        top:0;
        left:0;
        z-index:-1;
        overflow:hidden;
        }

        .bg-layer{
        position:absolute;
        width:100%;
        height:100%;
        background-size:cover;
        background-position:center;
        opacity:0;
        animation:fadeBg 16s infinite;
        }

        /* ảnh 1 */
        .bg1{
        background-image:url("chuadoi.jpg"); /* thay ảnh nếu cần */
        animation-delay:0s;
        }
        /* ảnh 2 */
        .bg2{
        background-image:url("songnuoc.jpg"); /* thay ảnh nếu cần */
        animation-delay:8s;
        }

        /* fade animation */
        @keyframes fadeBg{
        0%{opacity:0;}
        10%{opacity:1;}
        40%{opacity:1;}
        50%{opacity:0;}
        100%{opacity:0;}
        }

        /* overlay */
        .bg-overlay{
        position:absolute;
        width:100%;
        height:100%;
        background:linear-gradient(180deg,rgba(0,0,0,0.3),#020617);
        }

        /* ===== LOADING ===== */
        #loading {
            position: fixed;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle, #020617, #000);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            transition: 0.5s;
        }
        .loading-logo {
            width: 80px;
            height: 80px; /* Đảm bảo kích thước cố định */
            border-radius: 50%;
            animation: glow 2s infinite alternate;
            object-fit: cover;
        }
        @keyframes glow {
            from { box-shadow: 0 0 10px cyan; }
            to { box-shadow: 0 0 30px cyan; }
        }
        .progress {
            width: 250px;
            height: 8px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 10px;
            margin: 15px auto;
            overflow: hidden;
        }
        .progress-bar {
            height: 100%;
            width: 0%;
            background: cyan;
        }
        
        /* ===== PERFORMANCE ===== */
        #perf{
        position:fixed;
        top:10px;
        left:10px;
        background:rgba(0,0,0,0.6);
        padding:10px;
        border-radius:10px;
        font-size:12px;
        color:#00ffff;
        border:1px solid cyan;
        backdrop-filter:blur(5px);
        }
        
        /* ===== HACKER TEXT ===== */
        .credit {
            position: fixed;
            bottom: 10px;
            right: 15px;
            font-size: 13px;
            color: #00ffff;
            text-shadow: 0 0 5px #00ffff, 0 0 15px #00ffff;
            pointer-events: none;
            z-index: 100;
        }
        .credit.glitch { animation: glitch 1s infinite; }
        @keyframes glitch {
            0% { transform: translate(0); }
            20% { transform: translate(-1px, 1px); }
            40% { transform: translate(1px, -1px); }
            60% { transform: translate(-1px, -1px); }
            80% { transform: translate(1px, 1px); }
            100% { transform: translate(0); }
        }

        /* ===== THEME BUTTON ===== */
        .theme-toggle {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 10px 15px;
            border-radius: 20px;
            border: 1px solid cyan;
            background: rgba(0,255,255,0.1);
            color: cyan;
            cursor: pointer;
            z-index: 1000;
        }

        /* ===== LIGHT MODE ===== */
        body.light {
            background: linear-gradient(135deg, #e0f2fe, #f8fafc);
            color: #0f172a;
        }
        body.light .card, body.light .intro {
            background: white;
            color: #0f172a;
            border: 1px solid #cbd5e1;
        }
        body.light .link {
            background: #e2e8f0;
            color: #2563eb;
        }

        /* ===== HEADER ===== */
        .header {
            text-align: center;
            padding: 40px 20px;
        }
        .logo { 
            width: 100px; 
            height: 100px; 
            border-radius: 50%; 
            margin-bottom: 10px;
            object-fit: cover;
            border: 2px solid cyan;
        }

        /* ===== GRID ===== */
        .container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            padding: 30px;
            max-width: 1200px;
            margin: auto;
        }

        /* ===== CARD ===== */
        .card {
            padding: 25px;
            border-radius: 20px;
            text-align: center;
            cursor: pointer;
            background: rgba(255, 255, 255, 0.08);
            transition: 0.3s;
            border: 1px solid rgba(0, 255, 255, 0.2);
        }
        .card:hover {
            transform: translateY(-10px);
            box-shadow: 0 0 15px cyan;
            border-color: cyan;
        }

        .intro {
            max-width: 800px;
            margin: 20px auto;
            padding: 25px;
            border-radius: 20px;
            background: rgba(255, 255, 255, 0.08);
            text-align: center;
        }

        .link {
            display: block;
            padding: 15px;
            margin: 10px auto;
            width: 80%;
            max-width: 400px;
            border-radius: 10px;
            background: rgba(255, 255, 255, 0.1);
            text-decoration: none;
            color: cyan;
            border: 1px solid transparent;
            transition: 0.3s;
            text-align: center;
        }
        .link:hover { border-color: cyan; background: rgba(0, 255, 255, 0.1); }

        .back {
            position: fixed;
            bottom: 20px;
            left: 20px;
            width: 45px;
            height: 45px;
            line-height: 45px;
            background: cyan;
            color: black;
            border-radius: 50%;
            text-align: center;
            cursor: pointer;
            display: none;
            font-weight: bold;
            z-index: 100;
        }

        /* AI BOX */
        .ai-box {
            position: fixed;
            bottom: 60px;
            right: 20px;
            width: 280px;
            background: rgba(1, 10, 30, 0.9);
            border: 1px solid cyan;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            display: flex;
            flex-direction: column;
        }
        .ai-header { background: cyan; color: black; padding: 10px; text-align: center; font-weight: bold; }
        .ai-chat { height: 200px; overflow-y: auto; padding: 10px; font-size: 13px; }
        .ai-user { color: #fff; margin-bottom: 5px; text-align: right; }
        .ai-bot { color: cyan; margin-bottom: 10px; }
        #input {
            width: 100%;
            padding: 12px;
            border: none;
            border-top: 1px solid rgba(0, 255, 255, 0.3);
            background: #020617;
            color: white;
            outline: none;
        }

        /* RIPPLE */
        .ripple-effect {
            position: fixed;
            background: cyan;
            border-radius: 50%;
            transform: translate(-50%, -50%);
            pointer-events: none;
            animation: ripple 0.6s linear;
        }
        @keyframes ripple {
            from { width: 0px; height: 0px; opacity: 0.5; }
            to { width: 100px; height: 100px; opacity: 0; }
        }
    </style>
</head>

<body>

<div class="soc-trang-bg">
  <div class="bg-layer bg1"></div>
  <div class="bg-layer bg2"></div>
  <div class="bg-overlay"></div>
</div>

<div id="loading">
    <div style="text-align:center">
        <img src="9ae3a6a7a8ce299070df.jpg" class="loading-logo" alt="Logo">
        <h2 style="color: cyan; margin-top: 15px;">Tài liệu lớp 11</h2>
        <div class="progress">
            <div class="progress-bar" id="progressBar"></div>
        </div>
        <p id="loadingText">Hệ thống đang khởi động...</p>
    </div>
</div>

<button class="theme-toggle" id="themeBtn" onclick="toggleTheme()">🌙 Chế độ tối</button>

<div class="header">
    <img src="9ae3a6a7a8ce299070df.jpg" class="logo" alt="Logo">
    <h1>📚 TÀI LIỆU LỚP 11</h1>
    <p>Kho lưu trữ tài liệu lớp 11 năm học 2025-2026</p>
</div>

<div id="main" class="container"></div>
<div class="back" id="backBtn" onclick="back()">⬅</div>

<div class="ai-box">
    <div class="ai-header">🤖 Trợ lý AI</div>
    <div class="ai-chat" id="chat">
        <div class="ai-bot">Chào bạn! Bạn cần tìm tài liệu của lớp nào?</div>
    </div>
    <input id="input" placeholder="Hỏi: 11A? nhóm ?..." onkeydown="if(event.key==='Enter') send()">
</div>

<div class="credit" id="credit"></div>

<!-- PERFORMANCE PANEL -->
<div id="perf">
  FPS: <span id="fps">0</span><br>
  Ping: <span id="ping">0</span> ms
</div>

<script>
/* DỮ LIỆU */
const data = {
    "11A1": {
        "Nhóm 1": [
            {name: "VD1", link: "https://www.youtube.com/watch?v=WqVkuJehQ4w&list=RDWqVkuJehQ4w&start_radio=1"},
            {name: "VD2", link: "https://www.youtube.com/watch?v=sPQXOA6pzOg&list=RDsPQXOA6pzOg&start_radio=1"}
        ],
        "Nhóm 2": [],
        "Nhóm 3": [],
        "Nhóm 4": []
    },
    "11A2": {"Nhóm 1": [], "Nhóm 2": [], "Nhóm 3": [], "Nhóm 4": []},
    "11A3": {"Nhóm 1": [], "Nhóm 2": [], "Nhóm 3": [], "Nhóm 4": []},
    "11A6": {"Nhóm 1": [], "Nhóm 2": [], "Nhóm 3": [], "Nhóm 4": []}
};

let currentState = "home"; 
let currentClass = "";
const main = document.getElementById("main");

/* NAVIGATION */
function showClasses() {
    currentState = "home";
    main.innerHTML = "";
    document.getElementById("backBtn").style.display = "none";
    main.innerHTML += `<div class="card" onclick="showIntro()">📖 Giới thiệu website</div>`;
    Object.keys(data).forEach(c => {
        main.innerHTML += `<div class="card" onclick="showGroups('${c}')">Lớp ${c}</div>`;
    });
}

function showIntro() {
    currentState = "sub";
    main.innerHTML = `
    <div class="intro">
        <h2>📖 Giới thiệu</h2>
        <p>Đây là website lưu trữ tài liệu học tập cho học sinh khối 11.
        Website không phải do Minh Lê tự code ra mà có sự hỗ trợ của AI.
        Xin vui lòng không tranh luận về chất lượng sản phẩm. Cảm ơn!</p>
    <h3>💻 Cấu hình đề xuất</h3>

    <p><b>🟢 Tối thiểu:</b><br>
    CPU: Dual-core (Pentium, Celeron)<br>
    RAM: 2GB<br>
    Trình duyệt: Chrome / Edge bản mới<br>
    → Vẫn chạy được nhưng có thể hơi giật
    </p>

    <p><b>🔵 Khuyến nghị:</b><br>
    CPU: i3 / Ryzen 3 trở lên<br>
    RAM: 4GB trở lên<br>
    → Chạy mượt toàn bộ hiệu ứng
    </p>
    </div>`;
    document.getElementById("backBtn").style.display = "block";
}

function showGroups(c) {
    currentState = "groups";
    currentClass = c;
    main.innerHTML = "";
    document.getElementById("backBtn").style.display = "block";
    Object.keys(data[c]).forEach(g => {
        main.innerHTML += `<div class="card" onclick="showLinks('${g}')">${g}</div>`;
    });
}

function showLinks(g) {
    currentState = "links";
    main.innerHTML = `<h3 style="grid-column: 1/-1; text-align: center;">Tài liệu ${currentClass} - ${g}</h3>`;
    const links = data[currentClass][g];
    if (links.length === 0) {
        main.innerHTML += `<div class="intro"><h3>Chưa có dữ liệu</h3></div>`;
    } else {
        links.forEach(item => {
            main.innerHTML += `<a href="${item.link}" target="_blank" class="link">${item.name}</a>`;
        });
    }
}

function back() {
    if (currentState === "links") showGroups(currentClass);
    else showClasses();
}

/* AI */
function normalize(t) {
    return t.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "");
}

function send() {
    let input = document.getElementById("input");
    let text = input.value.trim();
    if (!text) return;
    let chat = document.getElementById("chat");
    chat.innerHTML += `<div class="ai-user">You: ${text}</div>`;

    let t = normalize(text);
    let foundClass = Object.keys(data).find(c => t.includes(c.toLowerCase()));
    let foundGroup = foundClass && Object.keys(data[foundClass]).find(g => t.includes(normalize(g)));

    let reply = "🤖 Thử hỏi: 11A1 nhóm 1";

    if (foundClass && foundGroup) {
        let links = data[foundClass][foundGroup];
        if (links.length === 0) reply = `Chưa có tài liệu cho ${foundClass} ${foundGroup}`;
        else {
            reply = `📚 Kết quả:<br>`;
            links.forEach(l => { reply += `👉 <a href="${l.link}" target="_blank" style="color:cyan">${l.name}</a><br>`; });
        }
    }
    chat.innerHTML += `<div class="ai-bot">${reply}</div>`;
    chat.scrollTop = chat.scrollHeight;
    input.value = "";
}

/* THEME */
function toggleTheme() {
    const isLight = document.body.classList.toggle("light");
    document.getElementById("themeBtn").innerText = isLight ? "☀️ Chế độ sáng" : "🌙 Chế độ tối";
}

/* EFFECT */

document.addEventListener("click", e => {
    let r = document.createElement("div");
    r.className = "ripple-effect";
    r.style.left = e.clientX + "px"; r.style.top = e.clientY + "px";
    document.body.appendChild(r);
    setTimeout(() => r.remove(), 600);
});

/* HACKER TEXT */
const creditText = "🤖 This website is made by AI";
let charIndex = 0;
function typeEffect() {
    if (charIndex < creditText.length) {
        document.getElementById("credit").innerHTML += creditText.charAt(charIndex);
        charIndex++;
        setTimeout(typeEffect, 70);
    } else { document.getElementById("credit").classList.add("glitch"); }
}

/* LOADING */
let progress = 0;
let loadInterval = setInterval(() => {
    progress += Math.random() * 20;
    if (progress > 100) progress = 100;
    document.getElementById("progressBar").style.width = progress + "%";
    if (progress === 100) {
        clearInterval(loadInterval);
        setTimeout(() => {
            document.getElementById("loading").style.opacity = 0;
            setTimeout(() => {
                document.getElementById("loading").style.display = "none";
                typeEffect();
            }, 500);
        }, 500);
    }
}, 200);

showClasses();

/* ===== FPS ===== */
let lastFrame = performance.now();
let frames = 0;

function measureFPS(){
  let now = performance.now();
  frames++;

  if(now - lastFrame >= 1000){
    document.getElementById("fps").innerText = frames;
    frames = 0;
    lastFrame = now;
  }

  requestAnimationFrame(measureFPS);
}
measureFPS();

/* ===== PING (response time) ===== */
function measurePing(){
  let start = performance.now();

  fetch(window.location.href, {method:"HEAD"})
    .then(()=>{
      let end = performance.now();
      document.getElementById("ping").innerText = Math.floor(end - start);
    })
    .catch(()=>{
      document.getElementById("ping").innerText = "ERR";
    });
}

setInterval(measurePing, 3000);
measurePing();

</script>
</body>
</html>
