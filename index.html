```html
<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Tài liệu lớp 11</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    font-family: 'Poppins', sans-serif;
    background: #020617;
    color: white;
    overflow-x: hidden;
    transition: 0.3s;
}

/* ===== LOADING ===== */
#loading{
    position:fixed;
    width:100%;
    height:100%;
    background:radial-gradient(circle,#020617,#000);
    display:flex;
    justify-content:center;
    align-items:center;
    z-index:9999;
    transition:0.5s;
}
.loading-logo{
    width:80px;
    border-radius:50%;
    animation:glow 2s infinite alternate;
}
@keyframes glow{
    from{box-shadow:0 0 10px cyan;}
    to{box-shadow:0 0 30px cyan;}
}
.progress{
    width:250px;
    height:8px;
    background:rgba(255,255,255,0.2);
    border-radius:10px;
    margin:10px auto;
    overflow:hidden;
}
.progress-bar{
    height:100%;
    width:0%;
    background:cyan;
}

/* ===== HACKER TEXT ===== */
.credit{
 position:fixed;
 bottom:10px;
 right:15px;
 font-size:13px;
 color:#00ffff;
 text-shadow:0 0 5px #00ffff, 0 0 15px #00ffff;
 pointer-events:none;
}

/* glitch */
.credit.glitch{
 animation:glitch 1s infinite;
}
@keyframes glitch{
 0%{transform:translate(0);}
 20%{transform:translate(-1px,1px);}
 40%{transform:translate(1px,-1px);}
 60%{transform:translate(-1px,-1px);}
 80%{transform:translate(1px,1px);}
 100%{transform:translate(0);}
}

/* ===== THEME BUTTON ===== */
.theme-toggle {
    position: fixed;
    top: 20px;
    right: 20px;
    padding: 10px 15px;
    border-radius: 20px;
    border: none;
    cursor: pointer;
    z-index: 1000;
}

/* ===== LIGHT MODE ===== */
body.light {
    background: linear-gradient(135deg, #e0f2fe, #f8fafc);
    color: #0f172a;
}

body.light .card,
body.light .intro {
    background: white;
    color: black;
}

body.light .link {
    background: #e2e8f0;
    color: #2563eb;
}

/* ===== NỀN ===== */
.study-bg {
    position: fixed;
    width: 100%;
    height: 100%;
    z-index: -1;
    overflow: hidden;
}

.icon {
    position: absolute;
    font-size: 26px;
    opacity: 0.15;
    animation: float linear infinite;
}

@keyframes float {
    from { transform: translateY(100vh) rotate(0deg); }
    to { transform: translateY(-10vh) rotate(360deg); }
}

/* ===== HEADER ===== */
.header {
    text-align: center;
    padding: 40px 20px;
}

.logo {
    width: 100px;
    border-radius: 50%;
}

/* ===== GRID ===== */
.container {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(180px,1fr));
    gap: 20px;
    padding: 30px;
}

/* ===== CARD ===== */
.card {
    padding: 25px;
    border-radius: 20px;
    text-align: center;
    cursor: pointer;
    background: rgba(255,255,255,0.08);
    transition: 0.3s;
    border:1px solid rgba(0,255,255,0.2);
}

.card:hover {
    transform: scale(1.1);
    box-shadow:0 0 15px cyan;
}

/* ===== INTRO ===== */
.intro {
    max-width: 800px;
    margin: auto;
    padding: 25px;
    border-radius: 20px;
    background: rgba(255,255,255,0.08);
    text-align: center;
}

/* ===== LINK ===== */
.link {
    display: block;
    padding: 12px;
    margin: 10px auto;
    width: 250px;
    border-radius: 10px;
    background: rgba(255,255,255,0.1);
    text-decoration: none;
    color: cyan;
}

/* ===== BACK ===== */
.back {
    position: fixed;
    bottom: 20px;
    left: 20px;
    padding: 10px 15px;
    background: cyan;
    color: black;
    border-radius: 20px;
    cursor: pointer;
    display: none;
}

/* ===== RIPPLE ===== */
@keyframes ripple{
 from{transform:translate(-50%,-50%) scale(1);opacity:0.7;}
 to{transform:translate(-50%,-50%) scale(12);opacity:0;}
}
</style>
</head>

<body>

<!-- LOADING -->
<div id="loading">
    <div style="text-align:center">
        <img src="logo.png" class="loading-logo">
        <h2>Tài liệu lớp 11</h2>
        <div class="progress">
            <div class="progress-bar" id="progressBar"></div>
        </div>
        <p id="loadingText">Đang tải...</p>
    </div>
</div>

<!-- nền -->
<div class="study-bg" id="bg"></div>

<!-- nút theme -->
<button class="theme-toggle" onclick="toggleTheme()">🌙 Dark</button>

<!-- header -->
<div class="header">
    <img src="logo.png" class="logo">
    <h1>📚 TÀI LIỆU LỚP 11</h1>
</div>

<!-- nội dung -->
<div id="main" class="container"></div>
<div class="back" id="backBtn" onclick="back()">⬅</div>

<!-- HACKER TEXT -->
<div class="credit" id="credit"></div>

<script>

/* ===== HACKER TEXT TYPING ===== */
const text="🤖 Website do AI tạo ra";
let i=0;
function type(){
 if(i<text.length){
  document.getElementById("credit").innerHTML+=text.charAt(i);
  i++;
  setTimeout(type,50);
 } else {
  document.getElementById("credit").classList.add("glitch");
 }
}

/* DATA */
const data = {
    "11A1": {
        "Nhóm 1": [
            {name:"Bài tập Toán", link:"#"},
            {name:"Đề kiểm tra", link:"#"}
        ],
        "Nhóm 2": [],
        "Nhóm 3": [],
        "Nhóm 4": []
    },
    "11A2": {"Nhóm 1": [],"Nhóm 2": [],"Nhóm 3": [],"Nhóm 4": []},
    "11A3": {"Nhóm 1": [],"Nhóm 2": [],"Nhóm 3": [],"Nhóm 4": []},
    "11A6": {"Nhóm 1": [],"Nhóm 2": [],"Nhóm 3": [],"Nhóm 4": []}
};

let currentClass="";
const main=document.getElementById("main");

/* MENU */
function showClasses(){
    main.innerHTML="";
    document.getElementById("backBtn").style.display="none";

    main.innerHTML += `<div class="card">📖 Giới thiệu</div>`;

    Object.keys(data).forEach(c=>{
        main.innerHTML += `<div class="card">${c}</div>`;
    });

    document.querySelectorAll(".card").forEach((el,i)=>{
        if(i===0){
            el.onclick=showIntro;
        } else {
            el.onclick=()=>showGroups(Object.keys(data)[i-1]);
        }
    });
}

/* INTRO */
function showIntro(){
    main.innerHTML = `
    <div class="intro">
        <h2>📖 Giới thiệu</h2>
        <p>Website lưu trữ tài liệu lớp 11</p>
    </div>
    `;
    document.getElementById("backBtn").style.display="block";
}

/* GROUP */
function showGroups(c){
    currentClass=c;
    main.innerHTML="";
    document.getElementById("backBtn").style.display="block";

    Object.keys(data[c]).forEach(g=>{
        main.innerHTML+=`<div class="card">${g}</div>`;
    });

    document.querySelectorAll(".card").forEach((el,i)=>{
        el.onclick=()=>showLinks(Object.keys(data[c])[i]);
    });
}

/* LINK */
function showLinks(g){
    main.innerHTML="";
    data[currentClass][g].forEach(item=>{
        main.innerHTML+=`<a href="${item.link}" target="_blank" class="link">${item.name}</a>`;
    });
}

/* BACK */
function back(){
    showClasses();
}

/* THEME */
function toggleTheme(){
    document.body.classList.toggle("light");
}

/* NỀN */
const icons=["📚","✏️","📖","📝"];
setInterval(()=>{
 let el=document.createElement("div");
 el.className="icon";
 el.innerText=icons[Math.floor(Math.random()*icons.length)];
 el.style.left=Math.random()*100+"vw";
 el.style.animationDuration=(6+Math.random()*6)+"s";
 bg.appendChild(el);
 setTimeout(()=>el.remove(),10000);
},400);

/* RIPPLE */
document.addEventListener("click",e=>{
 let r=document.createElement("span");
 r.style.position="fixed";
 r.style.left=e.clientX+"px";
 r.style.top=e.clientY+"px";
 r.style.width="10px";
 r.style.height="10px";
 r.style.background="cyan";
 r.style.borderRadius="50%";
 r.style.transform="translate(-50%,-50%)";
 r.style.animation="ripple 0.6s";
 document.body.appendChild(r);
 setTimeout(()=>r.remove(),600);
});

/* LOADING */
let p=0;
let load=setInterval(()=>{
 p+=Math.random()*20;
 if(p>100)p=100;
 document.getElementById("progressBar").style.width=p+"%";
 if(p===100){
  clearInterval(load);
  setTimeout(()=>{
   document.getElementById("loading").style.opacity=0;
   setTimeout(()=>{
    document.getElementById("loading").style.display="none";
    type(); // chạy chữ hacker
   },500);
  },500);
 }
},300);

/* START */
showClasses();

</script>

</body>
</html>
```
