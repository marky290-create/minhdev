<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tài liệu lớp 11</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
:root{
    --bg-dark:#020617;
    --bg-light:#f1f5f9;
    --card-dark:rgba(255,255,255,0.08);
    --card-light:#ffffff;
    --accent:cyan;
}

body{
    margin:0;
    font-family:'Poppins',sans-serif;
    background:var(--bg-dark);
    color:white;
    transition:0.3s;
}

/* LIGHT MODE */
body.light{
    background:var(--bg-light);
    color:black;
}

/* HEADER */
.header{
    text-align:center;
    padding:40px 20px 10px;
}

.logo{
    width:90px;
    border-radius:50%;
}

h1{
    font-size:32px;
}

/* GRID */
.container{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
    gap:20px;
    padding:25px;
}

/* CARD */
.card{
    padding:25px;
    border-radius:20px;
    text-align:center;
    cursor:pointer;
    background:var(--card-dark);
    backdrop-filter:blur(10px);
    transition:0.3s;
}

body.light .card{
    background:var(--card-light);
}

.card:hover{
    transform:translateY(-6px) scale(1.05);
    box-shadow:0 10px 25px rgba(0,255,255,0.3);
}

/* LINK */
.link{
    display:block;
    padding:12px;
    margin:10px auto;
    width:260px;
    border-radius:12px;
    background:rgba(255,255,255,0.1);
    color:var(--accent);
    text-decoration:none;
}

/* BOX */
.box{
    max-width:800px;
    margin:auto;
    padding:25px;
    border-radius:20px;
    background:var(--card-dark);
}

/* BACK */
.back{
    position:fixed;
    bottom:20px;
    left:20px;
    padding:10px 15px;
    border-radius:20px;
    background:cyan;
    color:black;
    cursor:pointer;
    display:none;
}

/* SEARCH */
.search{
    text-align:center;
    margin-top:10px;
}

.search input{
    padding:10px;
    width:250px;
    border-radius:20px;
    border:none;
}

/* THEME */
.theme{
    position:fixed;
    top:20px;
    right:20px;
    cursor:pointer;
}

/* TOAST */
.toast{
    position:fixed;
    bottom:20px;
    right:20px;
    background:black;
    color:white;
    padding:10px 15px;
    border-radius:10px;
    opacity:0;
    transition:0.3s;
}
</style>
</head>

<body>

<div class="theme" onclick="toggleTheme()">🌙</div>

<div class="header">
    <img src="9ae3a6a7a8ce299070df.jpg" class="logo">
    <h1>📚 TÀI LIỆU LỚP 11</h1>
</div>

<div class="search">
    <input placeholder="🔍 Tìm..." onkeyup="search(this.value)">
</div>

<div id="main" class="container"></div>
<div class="back" id="backBtn" onclick="back()">⬅</div>
<div class="toast" id="toast"></div>

<script>

/* DATA */
const data={
 "11A1":{"Nhóm 1":[{name:"Toán",link:"#"}],"Nhóm 2":[],"Nhóm 3":[],"Nhóm 4":[]},
 "11A2":{"Nhóm 1":[],"Nhóm 2":[],"Nhóm 3":[],"Nhóm 4":[]},
 "11A3":{"Nhóm 1":[],"Nhóm 2":[],"Nhóm 3":[],"Nhóm 4":[]},
 "11A6":{"Nhóm 1":[],"Nhóm 2":[],"Nhóm 3":[],"Nhóm 4":[]}
};

let currentClass="";
const main=document.getElementById("main");

/* MENU */
function menu(){
 main.innerHTML=`
 <div class="card">📖 Giới thiệu</div>
 <div class="card">❓ Hướng dẫn</div>
 `;
 Object.keys(data).forEach(c=>{
   main.innerHTML+=`<div class="card">${c}</div>`;
 });

 document.querySelectorAll(".card").forEach((el,i)=>{
  if(i==0) el.onclick=intro;
  else if(i==1) el.onclick=guide;
  else el.onclick=()=>groups(Object.keys(data)[i-2]);
 });
 backBtn.style.display="none";
}

/* INTRO */
function intro(){
 main.innerHTML=`<div class="box">
 <h2>📖 Giới thiệu</h2>
 Website lưu trữ tài liệu học tập lớp 11.
 </div>`;
 backBtn.style.display="block";
}

/* GUIDE */
function guide(){
 main.innerHTML=`<div class="box">
 <h2>❓ Hướng dẫn</h2>
 Chọn lớp → nhóm → tài liệu để mở.
 </div>`;
 backBtn.style.display="block";
}

/* GROUP */
function groups(c){
 currentClass=c;
 main.innerHTML="";
 Object.keys(data[c]).forEach(g=>{
  main.innerHTML+=`<div class="card">${g}</div>`;
 });
 document.querySelectorAll(".card").forEach((el,i)=>{
  el.onclick=()=>links(Object.keys(data[c])[i]);
 });
 backBtn.style.display="block";
}

/* LINKS */
function links(g){
 main.innerHTML="";
 data[currentClass][g].forEach(i=>{
  main.innerHTML+=`<a class="link" href="${i.link}" onclick="toastMsg('Đang mở...')">${i.name}</a>`;
 });
}

/* BACK */
function back(){ menu(); }

/* SEARCH */
function search(t){
 document.querySelectorAll(".card,.link").forEach(e=>{
  e.style.display=e.innerText.toLowerCase().includes(t.toLowerCase())?"block":"none";
 });
}

/* THEME */
function toggleTheme(){
 document.body.classList.toggle("light");
}

/* TOAST */
function toastMsg(t){
 let el=document.getElementById("toast");
 el.innerText=t;
 el.style.opacity=1;
 setTimeout(()=>el.style.opacity=0,2000);
}

/* LOAD */
menu();

</script>

</body>
</html>
