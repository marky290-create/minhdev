<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Tài liệu lớp 11</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    font-family: 'Poppins', sans-serif;
    background: #020617;
    color: white;
}

/* LOADING */
#loading{
    position:fixed;
    width:100%;
    height:100%;
    background:black;
    display:flex;
    justify-content:center;
    align-items:center;
    z-index:9999;
}
.progress{
    width:250px;
    height:8px;
    background:#222;
    border-radius:10px;
}
.progress-bar{
    height:100%;
    width:0%;
    background:cyan;
}

/* HEADER */
.header{
 text-align:center;
 padding:30px;
}

/* GRID */
.container{
 display:grid;
 grid-template-columns:repeat(auto-fit,minmax(150px,1fr));
 gap:15px;
 padding:20px;
}

/* CARD */
.card{
 padding:20px;
 border-radius:15px;
 text-align:center;
 background:rgba(255,255,255,0.08);
 cursor:pointer;
 border:1px solid rgba(0,255,255,0.2);
}
.card:hover{
 box-shadow:0 0 15px cyan;
 transform:scale(1.05);
}

/* LINK */
.link{
 display:block;
 padding:10px;
 margin:10px;
 border:1px solid cyan;
 color:cyan;
 text-decoration:none;
 border-radius:10px;
}

/* BACK */
.back{
 position:fixed;
 bottom:20px;
 left:20px;
 padding:10px;
 background:cyan;
 color:black;
 border-radius:10px;
 cursor:pointer;
 display:none;
}

/* AI */
.ai-box{
 position:fixed;
 bottom:20px;
 right:20px;
 width:260px;
 background:rgba(0,0,0,0.7);
 border:1px solid cyan;
 border-radius:10px;
 overflow:hidden;
}
.ai-header{
 background:cyan;
 color:black;
 padding:8px;
 text-align:center;
}
.ai-chat{
 height:180px;
 overflow:auto;
 padding:10px;
 font-size:13px;
}
.ai-user{color:white;}
.ai-bot{color:cyan;}
#input{
 width:100%;
 padding:8px;
 border:none;
 outline:none;
 background:#020617;
 color:white;
}

/* RIPPLE */
@keyframes ripple{
 from{transform:scale(1);opacity:0.7;}
 to{transform:scale(10);opacity:0;}
}
</style>
</head>

<body>

<div id="loading">
 <div>
  <h2>Loading...</h2>
  <div class="progress"><div class="progress-bar" id="bar"></div></div>
 </div>
</div>

<div class="header">
 <h1>📚 TÀI LIỆU LỚP 11</h1>
</div>

<div id="main" class="container"></div>
<div class="back" id="backBtn" onclick="back()">⬅</div>

<!-- AI -->
<div class="ai-box">
 <div class="ai-header">🤖 AI Chat</div>
 <div class="ai-chat" id="chat"></div>
 <input id="input" placeholder="Hỏi gì đó..." onkeydown="if(event.key==='Enter') send()">
</div>

<script>

/* DATA */
const data={
 "11A1":{"Nhóm 1":[{name:"Toán",link:"https://google.com"}],"Nhóm 2":[],"Nhóm 3":[],"Nhóm 4":[]},
 "11A2":{"Nhóm 1":[],"Nhóm 2":[],"Nhóm 3":[],"Nhóm 4":[]},
 "11A3":{"Nhóm 1":[],"Nhóm 2":[],"Nhóm 3":[],"Nhóm 4":[]},
 "11A6":{"Nhóm 1":[],"Nhóm 2":[],"Nhóm 3":[],"Nhóm 4":[]}
};

let currentClass="";
const main=document.getElementById("main");

/* MENU */
function showClasses(){
 main.innerHTML="";
 backBtn.style.display="none";

 main.innerHTML+=`<div class="card">📖 Giới thiệu</div>`;

 Object.keys(data).forEach(c=>{
  main.innerHTML+=`<div class="card">${c}</div>`;
 });

 document.querySelectorAll(".card").forEach((el,i)=>{
  if(i===0) el.onclick=showIntro;
  else el.onclick=()=>showGroups(Object.keys(data)[i-1]);
 });
}

/* INTRO */
function showIntro(){
 main.innerHTML=`<div class="card">Website lưu trữ tài liệu lớp 11</div>`;
 backBtn.style.display="block";
}

/* GROUP */
function showGroups(c){
 currentClass=c;
 main.innerHTML="";
 backBtn.style.display="block";

 Object.keys(data[c]).forEach(g=>{
  main.innerHTML+=`<div class="card">${g}</div>`;
 });

 document.querySelectorAll(".card").forEach((el,i)=>{
  el.onclick=()=>showLinks(Object.keys(data[c])[i]);
 });
}

/* LINK */
function showLinks(g){
 main.innerHTML="";
 data[currentClass][g].forEach(i=>{
  main.innerHTML+=`<a class="link" href="${i.link}" target="_blank">${i.name}</a>`;
 });
}

/* BACK */
function back(){
 showClasses();
}

/* AI SMART */
function normalize(t){
 return t.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g,"");
}

function send(){
 let input=document.getElementById("input");
 let text=input.value.trim();
 if(!text) return;

 let chat=document.getElementById("chat");
 chat.innerHTML+=`<div class="ai-user">👤 ${text}</div>`;

 let t=normalize(text);
 let foundClass=Object.keys(data).find(c=>t.includes(c.toLowerCase()));
 let foundGroup=foundClass && Object.keys(data[foundClass]).find(g=>t.includes(normalize(g)));

 let reply="🤖 Không hiểu 😅";

 if(foundClass && foundGroup){
  let links=data[foundClass][foundGroup];
  if(links.length===0){
   reply="Nhóm chưa có tài liệu";
  }else{
   reply=`📚 ${foundClass} - ${foundGroup}<br>`;
   links.forEach(l=>{
    reply+=`👉 <a href="${l.link}" target="_blank" style="color:cyan">${l.name}</a><br>`;
   });
  }
 }else{
  reply="Thử hỏi: 11A1 nhóm 1";
 }

 chat.innerHTML+=`<div class="ai-bot">${reply}</div>`;
 chat.scrollTop=chat.scrollHeight;
 input.value="";
}

/* RIPPLE */
document.addEventListener("click",e=>{
 let r=document.createElement("span");
 r.style.position="fixed";
 r.style.left=e.clientX+"px";
 r.style.top=e.clientY+"px";
 r.style.width="10px";
 r.style.height="10px";
 r.style.background="cyan";
 r.style.borderRadius="50%";
 r.style.animation="ripple 0.6s";
 document.body.appendChild(r);
 setTimeout(()=>r.remove(),600);
});

/* LOADING */
let p=0;
let load=setInterval(()=>{
 p+=10;
 bar.style.width=p+"%";
 if(p>=100){
  clearInterval(load);
  loading.style.display="none";
 }
},100);

/* START */
showClasses();

</script>

</body>
</html>
