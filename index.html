<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tài liệu lớp 11</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

    <style>
        body {
            margin: 0;
            font-family: 'Poppins', sans-serif;
            background: #020617;
            color: white;
            overflow-x: hidden;
            transition: 0.3s;
        }

        /* ===== LOADING ===== */
        #loading {
            position: fixed;
            width: 100%; height: 100%;
            background: radial-gradient(circle, #020617, #000);
            display: flex; justify-content: center; align-items: center;
            z-index: 9999; transition: 0.5s;
        }
        .loading-logo {
            width: 100px; /* Tăng kích thước logo lúc load */
            border-radius: 50%;
            animation: glow 2s infinite alternate;
            margin-bottom: 20px;
        }
        @keyframes glow {
            from { box-shadow: 0 0 10px cyan; }
            to { box-shadow: 0 0 30px cyan; }
        }
        .progress {
            width: 250px; height: 8px;
            background: rgba(255,255,255,0.2);
            border-radius: 10px; margin: 10px auto; overflow: hidden;
        }
        .progress-bar { height: 100%; width: 0%; background: cyan; transition: 0.2s; }

        /* ===== THEME BUTTON ===== */
        .theme-toggle {
            position: fixed; top: 20px; right: 20px;
            padding: 10px 15px; border-radius: 20px;
            border: 1px solid cyan; background: rgba(0,255,255,0.1);
            color: cyan; cursor: pointer; z-index: 1000;
        }
        body.light { background: #f8fafc; color: #0f172a; }
        body.light .card { background: white; color: black; border: 1px solid #e2e8f0; }

        /* ===== NỀN ===== */
        .study-bg { position: fixed; width: 100%; height: 100%; z-index: -1; overflow: hidden; }
        .icon { position: absolute; font-size: 26px; opacity: 0.15; animation: float linear infinite; }
        @keyframes float {
            from { transform: translateY(100vh) rotate(0deg); }
            to { transform: translateY(-10vh) rotate(360deg); }
        }

        /* ===== HEADER ===== */
        .header { text-align: center; padding: 40px 20px; }
        .logo { 
            width: 120px; /* Kích thước logo trang chủ */
            border-radius: 50%; 
            margin-bottom: 15px;
            border: 2px solid cyan;
            padding: 5px;
        }

        /* ===== GRID & CARDS ===== */
        .container {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px; padding: 30px; max-width: 1200px; margin: auto;
        }
        .card {
            padding: 25px; border-radius: 20px; text-align: center;
            cursor: pointer; background: rgba(255,255,255,0.08);
            transition: 0.3s; border: 1px solid rgba(0,255,255,0.2);
        }
        .card:hover { transform: scale(1.05); box-shadow: 0 0 15px cyan; }

        .link {
            display: block; padding: 12px; margin: 10px auto;
            width: 250px; border-radius: 10px; background: rgba(255,255,255,0.1);
            text-decoration: none; color: cyan; text-align: center;
        }

        .back {
            position: fixed; bottom: 20px; left: 20px;
            padding: 10px 20px; background: cyan; color: black;
            border-radius: 20px; cursor: pointer; display: none; font-weight: bold;
        }

        /* ===== HACKER TEXT ===== */
        .credit {
            position: fixed; bottom: 10px; right: 15px;
            font-size: 13px; color: #00ffff;
            text-shadow: 0 0 5px #00ffff; pointer-events: none;
        }
        .glitch { animation: glitch 1s infinite; }
        @keyframes glitch {
            0% { transform: translate(0); }
            20% { transform: translate(-1px, 1px); }
            100% { transform: translate(0); }
        }

        /* AI BOX */
        .ai-box {
            position: fixed; bottom: 20px; right: 20px; width: 260px;
            background: rgba(0,0,0,0.85); border: 1px solid cyan;
            border-radius: 10px; overflow: hidden;
        }
        .ai-header { background: cyan; color: black; padding: 8px; text-align: center; font-weight: bold; }
        .ai-chat { height: 180px; overflow: auto; padding: 10px; font-size: 13px; }
        #input { width: 100%; padding: 10px; border: none; background: #020617; color: white; outline: none; }
        
        .ripple {
            position: fixed; background: cyan; border-radius: 50%;
            pointer-events: none; transform: translate(-50%, -50%);
            animation: ripple-anim 0.6s linear;
        }
        @keyframes ripple-anim { from { width: 0; height: 0; opacity: 0.5; } to { width: 100px; height: 100px; opacity: 0; } }
    </style>
</head>
<body>

<div id="loading">
    <div style="text-align:center">
        <img src="logo.png" class="loading-logo" alt="Loading...">
        <h2 style="color: cyan;">TÀI LIỆU LỚP 11</h2>
        <div class="progress">
            <div class="progress-bar" id="progressBar"></div>
        </div>
        <p id="loadingText">Hệ thống đang khởi động...</p>
    </div>
</div>

<div class="study-bg" id="bg"></div>

<button class="theme-toggle" onclick="toggleTheme()">🌙 Chế độ tối</button>

<div class="header">
    <img src="logo.png" class="logo" alt="Logo">
    <h1>📚 TÀI LIỆU LỚP 11</h1>
    <p>Kho lưu trữ tài liệu học tập thông minh</p>
</div>

<div id="main" class="container"></div>
<div class="back" id="backBtn" onclick="back()">⬅ Quay lại</div>

<div class="ai-box">
    <div class="ai-header">🤖 Trợ lý AI</div>
    <div class="ai-chat" id="chat">
        <div style="color: cyan;">Chào bạn! Bạn cần tìm tài liệu gì?</div>
    </div>
    <input id="input" placeholder="Hỏi: 11A1 nhóm 1..." onkeydown="if(event.key==='Enter') sendAI()">
</div>

<div class="credit" id="credit"></div>

<script>
/* DỮ LIỆU */
const data = {
    "11A1": {
        "Nhóm 1": [{name: "Bài tập Toán", link: "#"}, {name: "Đề kiểm tra Lí", link: "#"}],
        "Nhóm 2": [], "Nhóm 3": [], "Nhóm 4": []
    },
    "11A2": {"Nhóm 1": [], "Nhóm 2": [], "Nhóm 3": [], "Nhóm 4": []},
    "11A3": {"Nhóm 1": [], "Nhóm 2": [], "Nhóm 3": [], "Nhóm 4": []},
    "11A6": {"Nhóm 1": [], "Nhóm 2": [], "Nhóm 3": [], "Nhóm 4": []}
};

let view = "home";
let currentClass = "";
const main = document.getElementById("main");

/* NAVIGATION */
function showClasses() {
    view = "home";
    main.innerHTML = `<div class="card" onclick="showIntro()">📖 Giới thiệu</div>`;
    Object.keys(data).forEach(c => {
        main.innerHTML += `<div class="card" onclick="showGroups('${c}')">Lớp ${c}</div>`;
    });
    document.getElementById("backBtn").style.display = "none";
}

function showIntro() {
    view = "sub";
    main.innerHTML = `<div style="grid-column: 1/-1; text-align: center; background: rgba(255,255,255,0.05); padding: 30px; border-radius: 20px;">
        <h2>📖 Giới thiệu</h2>
        <p>Website được tạo ra để lưu trữ và chia sẻ tài liệu học tập khối 11.</p>
    </div>`;
    document.getElementById("backBtn").style.display = "block";
}

function showGroups(c) {
    view = "groups";
    currentClass = c;
    main.innerHTML = "";
    Object.keys(data[c]).forEach(g => {
        main.innerHTML += `<div class="card" onclick="showLinks('${g}')">${g}</div>`;
    });
    document.getElementById("backBtn").style.display = "block";
}

function showLinks(g) {
    view = "links";
    main.innerHTML = `<h3 style="grid-column: 1/-1; text-align: center;">Tài liệu ${currentClass} - ${g}</h3>`;
    const items = data[currentClass][g];
    if (items.length === 0) {
        main.innerHTML += `<p style="grid-column: 1/-1; text-align: center;">Chưa có tài liệu.</p>`;
    } else {
        items.forEach(item => {
            main.innerHTML += `<a href="${item.link}" target="_blank" class="link">${item.name}</a>`;
        });
    }
}

function back() {
    if (view === "links") showGroups(currentClass);
    else showClasses();
}

/* AI */
function sendAI() {
    const input = document.getElementById("input");
    const chat = document.getElementById("chat");
    const text = input.value.trim();
    if (!text) return;

    chat.innerHTML += `<div style="text-align: right; margin-bottom: 5px;">👤 ${text}</div>`;
    
    // Logic AI đơn giản
    let reply = "🤖 Thử hỏi: 11A1 nhóm 1";
    const low = text.toLowerCase();
    const fClass = Object.keys(data).find(c => low.includes(c.toLowerCase()));
    if (fClass) {
        const fGroup = Object.keys(data[fClass]).find(g => low.includes(g.toLowerCase().replace(" ", "")));
        if (fGroup) {
            const links = data[fClass][fGroup];
            reply = links.length > 0 ? `📚 Kết quả cho ${fClass} ${fGroup}:<br>` + links.map(l => `👉 <a href="${l.link}" style="color:cyan">${l.name}</a>`).join("<br>") : "Nhóm này chưa có tài liệu.";
        } else {
            reply = `Bạn muốn xem nhóm nào của lớp ${fClass}?`;
        }
    }

    chat.innerHTML += `<div style="color: cyan; margin-bottom: 10px;">${reply}</div>`;
    chat.scrollTop = chat.scrollHeight;
    input.value = "";
}

/* HACKER TYPING */
function typeCredit() {
    const target = "🤖 Website được phát triển bởi AI Core";
    let i = 0;
    const el = document.getElementById("credit");
    function typing() {
        if (i < target.length) {
            el.innerHTML += target.charAt(i);
            i++;
            setTimeout(typing, 60);
        } else {
            el.classList.add("glitch");
        }
    }
    typing();
}

/* THEME */
function toggleTheme() {
    document.body.classList.toggle("light");
}

/* LOADING */
let p = 0;
const interval = setInterval(() => {
    p += Math.random() * 15;
    if (p >= 100) {
        p = 100;
        clearInterval(interval);
        setTimeout(() => {
            document.getElementById("loading").style.opacity = 0;
            setTimeout(() => {
                document.getElementById("loading").style.display = "none";
                typeCredit();
            }, 500);
        }, 500);
    }
    document.getElementById("progressBar").style.width = p + "%";
}, 200);

/* RIPPLE EFFECT */
document.addEventListener("click", e => {
    const r = document.createElement("div");
    r.className = "ripple";
    r.style.left = e.clientX + "px";
    r.style.top = e.clientY + "px";
    document.body.appendChild(r);
    setTimeout(() => r.remove(), 600);
});

/* BACKGROUND ICONS */
const icons = ["📚", "📐", "🧪", "📝"];
setInterval(() => {
    const el = document.createElement("div");
    el.className = "icon";
    el.innerText = icons[Math.floor(Math.random() * icons.length)];
    el.style.left = Math.random() * 100 + "vw";
    el.style.animationDuration = (Math.random() * 5 + 5) + "s";
    document.getElementById("bg").appendChild(el);
    setTimeout(() => el.remove(), 10000);
}, 600);

showClasses();
</script>

</body>
</html>
