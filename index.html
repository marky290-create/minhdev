<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Game UI - Tài liệu 11</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
body{
 margin:0;
 font-family:Poppins;
 background:#020617;
 color:white;
 overflow:hidden;
}

/* ===== PARTICLE ===== */
canvas{
 position:fixed;
 top:0;
 left:0;
 z-index:-1;
}

/* ===== LAYOUT ===== */
.app{
 display:flex;
 height:100vh;
}

/* ===== SIDEBAR ===== */
.sidebar{
 width:220px;
 background:rgba(0,0,0,0.6);
 backdrop-filter:blur(10px);
 border-right:1px solid rgba(0,255,255,0.2);
 padding:20px;
}

.sidebar h2{
 text-align:center;
 color:cyan;
 text-shadow:0 0 10px cyan;
}

.menu-item{
 padding:12px;
 margin:10px 0;
 border-radius:10px;
 cursor:pointer;
 border:1px solid transparent;
}

.menu-item:hover{
 border:1px solid cyan;
 box-shadow:0 0 10px cyan;
}

/* ===== MAIN ===== */
.main{
 flex:1;
 padding:30px;
 overflow:auto;
}

/* ===== PANEL ===== */
.panel{
 background:rgba(255,255,255,0.05);
 backdrop-filter:blur(15px);
 border:1px solid rgba(0,255,255,0.2);
 border-radius:15px;
 padding:20px;
 animation:fade 0.5s;
}

@keyframes fade{
 from{opacity:0; transform:translateY(10px);}
 to{opacity:1; transform:translateY(0);}
}

/* ===== CARD ===== */
.card{
 padding:20px;
 margin:10px;
 display:inline-block;
 border-radius:12px;
 border:1px solid rgba(0,255,255,0.2);
 cursor:pointer;
 transition:0.3s;
}

.card:hover{
 transform:scale(1.05);
 box-shadow:0 0 15px cyan;
}

/* ===== LINK ===== */
.link{
 display:block;
 padding:12px;
 margin:10px;
 border-radius:10px;
 border:1px solid cyan;
 color:cyan;
 text-decoration:none;
}

.link:hover{
 box-shadow:0 0 10px cyan;
}

/* ===== RIPPLE ===== */
@keyframes ripple{
 from{transform:scale(1);opacity:0.7;}
 to{transform:scale(10);opacity:0;}
}
</style>
</head>

<body>

<canvas id="bg"></canvas>

<div class="app">

<!-- SIDEBAR -->
<div class="sidebar">
 <h2>📚 TL11</h2>
 <div class="menu-item" onclick="home()">🏠 Trang chủ</div>
 <div class="menu-item" onclick="intro()">📖 Giới thiệu</div>
</div>

<!-- MAIN -->
<div class="main" id="main"></div>

</div>

<script>

/* ===== DATA ===== */
const data={
 "11A1":{"Nhóm 1":[{name:"Toán",link:"#"}],"Nhóm 2":[],"Nhóm 3":[],"Nhóm 4":[]},
 "11A2":{"Nhóm 1":[],"Nhóm 2":[],"Nhóm 3":[],"Nhóm 4":[]},
 "11A3":{"Nhóm 1":[],"Nhóm 2":[],"Nhóm 3":[],"Nhóm 4":[]},
 "11A6":{"Nhóm 1":[],"Nhóm 2":[],"Nhóm 3":[],"Nhóm 4":[]}
};

let currentClass="";
const main=document.getElementById("main");

/* ===== HOME ===== */
function home(){
 main.innerHTML='<div class="panel"><h2>Chọn lớp</h2></div>';
 Object.keys(data).forEach(c=>{
  main.innerHTML+=`<div class="card">${c}</div>`;
 });

 document.querySelectorAll(".card").forEach((el,i)=>{
  el.onclick=()=>groups(Object.keys(data)[i]);
 });
}

/* ===== INTRO ===== */
function intro(){
 main.innerHTML='<div class="panel">Website tài liệu lớp 11</div>';
}

/* ===== GROUP ===== */
function groups(c){
 currentClass=c;
 main.innerHTML='<div class="panel"><h2>'+c+'</h2></div>';
 Object.keys(data[c]).forEach(g=>{
  main.innerHTML+=`<div class="card">${g}</div>`;
 });

 document.querySelectorAll(".card").forEach((el,i)=>{
  el.onclick=()=>links(Object.keys(data[c])[i]);
 });
}

/* ===== LINKS ===== */
function links(g){
 main.innerHTML='<div class="panel"><h2>'+g+'</h2></div>';
 data[currentClass][g].forEach(i=>{
  main.innerHTML+=`<a class="link" href="${i.link}" target="_blank">${i.name}</a>`;
 });
}

/* ===== PARTICLE ===== */
const canvas=document.getElementById("bg");
const ctx=canvas.getContext("2d");
canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

let particles=[];
for(let i=0;i<80;i++){
 particles.push({
  x:Math.random()*canvas.width,
  y:Math.random()*canvas.height,
  dx:(Math.random()-0.5)*0.5,
  dy:(Math.random()-0.5)*0.5
 });
}

function draw(){
 ctx.clearRect(0,0,canvas.width,canvas.height);
 ctx.fillStyle="cyan";

 particles.forEach(p=>{
  ctx.beginPath();
  ctx.arc(p.x,p.y,2,0,Math.PI*2);
  ctx.fill();

  p.x+=p.dx;
  p.y+=p.dy;

  if(p.x<0||p.x>canvas.width) p.dx*=-1;
  if(p.y<0||p.y>canvas.height) p.dy*=-1;
 });

 requestAnimationFrame(draw);
}
draw();

/* ===== RIPPLE ===== */
document.addEventListener("click",e=>{
 let r=document.createElement("span");
 r.style.position="fixed";
 r.style.left=e.clientX+"px";
 r.style.top=e.clientY+"px";
 r.style.width="10px";
 r.style.height="10px";
 r.style.background="cyan";
 r.style.borderRadius="50%";
 r.style.animation="ripple 0.6s";
 document.body.appendChild(r);
 setTimeout(()=>r.remove(),600);
});

/* LOAD */
home();

</script>

</body>
</html>
